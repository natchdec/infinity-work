name: Deploy to GCP via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_SERVER_IP }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            # ตรวจสอบว่ามีโฟลเดอร์โปรเจกต์หรือยัง ถ้ายังไม่มีให้ clone ใหม่
            if [ ! -d "infinity-work" ]; then
              echo "📦 Cloning repository for the first time..."
              git clone https://github.com/natchdec/infinity-work.git
            fi
            
            cd infinity-work
            
            echo "📥 Pulling latest code from GitHub..."
            git pull origin main
            
            echo "🐳 Rebuilding and Restarting Docker Containers..."
            sudo docker compose up -d --build
            
            echo "🗄️ Running Database Migrations..."
            sudo docker exec work-os-web npx prisma db push
            
            echo "✅ Deployment Successful!"
